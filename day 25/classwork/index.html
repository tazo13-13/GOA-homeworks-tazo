<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 1)  -->
    <!--inline css -- როცა სტილი პირადპირ ელემენტში წერია, მას ვიყენებთ მაშინ როცა ელემენტის გასტილვა გვინდა მაგალითად ფერის დამატება ტექსტის გაზრდა და ასეშემდეგ...   -->


    <!-- 2) -->
    <h1 style="text-align: center; color:blue;background-color: chocolate;">ინფორმაცია</h1>

    <h3 style="text-align: left;color:red;background-color: chocolate;">სახელი</h3>

    <p style="text-align: center;color:red;background-color: rgb(130, 104, 85);">თაზო</p>

    <h3 style="text-align: left;color:chartreuse;background-color: chocolate;">ქვეყანა</h3>

    <p style="text-align: center;color: chartreuse;background-color: rgb(163, 103, 61);">საქართველო</p>
<br><br><br>

    <!-- 3) -->
    <!-- დადებითი ისარის რომ: შეგვიძლია ერთი ელემენტი მალევე შევცვალოთ -->
    <!-- უარყოფითი ისაა რომ: თუ ვთქვათ გვინდა რომ ყველა პარაგრაფი იყოს მწვანე ყველას ცალცალკე უნდა გავუწეროთ -->


    <!-- 4) -->
    <!-- internal css -- იწერება html ფაილში <style> - tag_ში  ვიყენებთ მაშინ როცა გვინდა ბევრი ელემენტის გასტილვა ერთად-->


    <!-- 5) -->
    <style>
        p , button {
            color:blue;
            background-color: antiquewhite;
            text-align: center;
        }
    </style>
    <p> მე მქვია თაზო</p>
    <p>ვცხოვრობ თბილიში</p>
    <p>ვარ კალათბურთელი</p>
    <p>ვარ 16 წლის</p>
    <p>ვსწავლობ გოაში</p>
<br><br>

    <!-- 6) -->
    <p>არ დააჭირო</p>
    <button>დააჭირე</button>
    <!--style მიწერია 5) თე დავალებაში ამისიც!!!  -->


    <!-- 7) -->
    <!-- internal css უკეთესია inlin css ზე რადგან არ გვიწევს ყოველ ჯერზე style ელემენტის გაწერა და ხელმეორედ ინფორმაციის შეტანა -->
</body>
</html>
