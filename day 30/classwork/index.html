<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <!-- 1) -->
    <!-- ol - ჩაიწერება ასე 1, 2, 3 ...     ul ჩაიწერება შევსებული წერტილებით -->


    <!-- 2) -->
    <ol>
        <li>food</li>
        <ul>
            <li>ხაჭაპური</li>
            <li>ლობიანი</li>
        </ul>
    </ol>
    <ol>
        <li>drink</li>
        <ul>
            <li>წყალი</li>
            <li>კიკა-კოლა</li>
            <li>ფანტა</li>
        </ul>
    </ol>


    <!-- 3) -->
    <table border="3px">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Salary</th>
        </tr>
        <tr>
            <td>john</td>
            <td>24</td>
            <td>20,000</td>
        </tr>
        <tr>
            <td>Cris</td>
            <td>27</td>
            <td>32,000</td>
        </tr>
    </table>
</body>
</html>
