<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student entry date form</h1>
    <form>
        <label>Student Name:</label>
        <input type="text">
        <br><br>
        <label>Email:</label>
        <input type="email">
        <br><br>
        <label>Gender:</label>
        <label for="t1">Boy</label>
        <input type="radio" id="t1" name="Gender">
        <label for="t2">Girl</label>
        <input type="radio" id="t2" name="Gender">
        <br><br>
        <label>Subjects:</label>
        <input type="checkbox" id="q1">
        <label for="q1">Tamil</label>
        <input type="checkbox" id="q2">
        <label for="q2">Telugu</label>
        <input type="checkbox" id="q3">
        <label for="q3">English</label>
        <input type="checkbox" id="q4">
        <label for="q4">Physicks</label>
        <input type="checkbox" id="q5">
        <label for="q5">Economics</label>
        <br><br>
        <label>Citi and Town:</label>
        <select>
            <option>Georgia</option>
            <option>Tbilisi</option>
            <option selected disabled>საქართველო</option>
        </select>
        <br><br>
        <label>Coments:</label>
        <input type="text">
        <br><br>
        <input type="reset" value="Clear">
        <input type="submit">
    </form>
</body>
</html>
